name: Ingest jobs

# Refreshes live ATS jobs into Atlas every 6 hours, decoupled from the app
# process (so app restarts don't re-trigger ingest) and run from GitHub's IP
# pool rather than the app host. Set MONGO_URL + DB_NAME as repo secrets.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Limit to one ATS source (optional)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run ingest
        working-directory: backend
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            python -m ingest.cli run --source "${{ github.event.inputs.source }}"
          else
            python -m ingest.cli run
          fi
