# Local full-stack parity: frontend (nginx) -> backend (FastAPI) -> mongo.
# Production uses MongoDB Atlas instead of this mongo container (see render.yaml).
#
#   docker compose up --build
#   open http://localhost:8080
#   # populate real jobs (one-off):
#   docker compose exec backend python -m ingest.cli run

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: jobcity
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-32-characters-min}
      CORS_ORIGINS: http://localhost:8080
      APP_ENV: development
      INGEST_SCHEDULER_DISABLED: "1"
      AI_FEATURES_ENABLED: "0"
      PORT: "8001"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BACKEND_URL: http://backend:8001
    depends_on:
      - backend

volumes:
  mongo_data:
